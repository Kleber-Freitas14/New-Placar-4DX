<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar 4DX</title>

    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>



<body>
    <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a href="#" class="navbar-brand">
                <img src="./img/rei.png" class="d-inline-block align-text-top" width="30" height="30">
                PLACAR 4DX
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="./index.html" class="nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="./cadastro-atividade.html" class="nav-link">Cadastro das Atividades</a>
                    </li>
                    <li class="nav-item">
                        <a href="./placar.html" class="nav-link">Placar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2 id="lista">
            Relação de Atividades Cadastradas
        </h2>
    </div>

    <div class="container mt-4">
        
        <table id = tblista class="table table-hover tabela-transparente">
            <thead class="table-dark">
                <tr>
                    <th>Título</th>
                    <th>Setor</th>
                    <th>Responsável</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaProcessos"></tbody>
        </table>
    </div>

    <!-- MODAL DE EDIÇÃO -->
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Editar Processo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="editId">

                    <input id="editDescricao" class="form-control mb-2" placeholder="Descrição">
                    <input id="editSetor" class="form-control mb-2" placeholder="Setor">
                    <input id="editColaborador" class="form-control mb-2" placeholder="Responsável">
                    <input type="datetime-local" id="editData" class="form-control">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
                </div>

            </div>
        </div>
    </div>

    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/script.js"></script>

    <script>
        listarProcessos();
    </script>

    <script src="./js/popper.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/script.js"></script>

</body>

</html>
